# Demoboard - Kubernetes stack with OpenTelemetry enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: vm00
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demoboard-postgres-pvc
  namespace: vm00
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demoboard-postgres
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demoboard-postgres
  template:
    metadata:
      labels:
        app: demoboard-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: Always
          env:
            - name: POSTGRES_DB
              value: tasks
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: demoboard-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: vm00
spec:
  selector:
    app: demoboard-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demoboard-redis
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demoboard-redis
  template:
    metadata:
      labels:
        app: demoboard-redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vm00
spec:
  selector:
    app: demoboard-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demoboard-api
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demoboard-api
  template:
    metadata:
      labels:
        app: demoboard-api
    spec:
      containers:
        - name: api
          image: localhost:32000/api:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DB_BACKEND
              value: postgres
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: tasks
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: REDIS_HOST
              value: redis
            - name: REDIS_QUEUE
              value: jobs
            - name: ENABLE_WORKER
              value: "true"
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: demoboard-api
            - name: OTEL_SERVICE_VERSION
              value: "0.1.0"
            - name: OTEL_ENVIRONMENT
              value: kubernetes-vm00
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: vm00
spec:
  selector:
    app: demoboard-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demoboard-worker
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demoboard-worker
  template:
    metadata:
      labels:
        app: demoboard-worker
    spec:
      containers:
        - name: worker
          image: localhost:32000/worker:v1
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: tasks
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: REDIS_HOST
              value: redis
            - name: REDIS_QUEUE
              value: jobs
            - name: WORKER_PROCESSING_TIME_MIN_SECONDS
              value: "1.5"
            - name: WORKER_PROCESSING_TIME_MAX_SECONDS
              value: "2.7"
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: demoboard-worker
            - name: OTEL_SERVICE_VERSION
              value: "0.1.0"
            - name: OTEL_ENVIRONMENT
              value: kubernetes-vm00
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: vm00
spec:
  selector:
    app: demoboard-worker
  ports:
    - port: 9000
      targetPort: 9000
      name: metrics
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demoboard-frontend
  namespace: vm00
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demoboard-frontend
  template:
    metadata:
      labels:
        app: demoboard-frontend
    spec:
      containers:
        - name: frontend
          image: localhost:32000/front:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: vm00
spec:
  selector:
    app: demoboard-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demoboard
  namespace: vm00
spec:
  ingressClassName: nginx
  rules:
    - host: demoboard.vm00.eks.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
