version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-service:
    build: ./api-service
    environment:
      DB_BACKEND: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasks
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_QUEUE: jobs
      ENABLE_WORKER: "true"
      NODE_NAME: ${NODE_NAME:-}
      NODE_ZONE: ${NODE_ZONE:-}
      DEGRADED_NODE_ZONE_MATCH: ${DEGRADED_NODE_ZONE_MATCH:-eu-west-3c}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_METRICS_EXEMPLAR_FILTER: ${OTEL_METRICS_EXEMPLAR_FILTER:-trace_based}
      OTEL_SERVICE_NAME: demoboard-api
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-docker-compose}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      APP_LOG_FILE: /var/log/demoboard/api-service.log
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./observability-logs/api:/var/log/demoboard

  worker-service:
    build: ./worker-service
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasks
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_QUEUE: jobs
      NODE_NAME: ${NODE_NAME:-}
      NODE_ZONE: ${NODE_ZONE:-}
      DEGRADED_NODE_ZONE_MATCH: ${DEGRADED_NODE_ZONE_MATCH:-eu-west-3c}
      WORKER_PROCESSING_TIME_MIN_SECONDS: ${WORKER_PROCESSING_TIME_MIN_SECONDS:-1.5}
      WORKER_PROCESSING_TIME_MAX_SECONDS: ${WORKER_PROCESSING_TIME_MAX_SECONDS:-2.7}
      DEGRADED_WORKER_PROCESSING_TIME_MIN_SECONDS: ${DEGRADED_WORKER_PROCESSING_TIME_MIN_SECONDS:-3.5}
      DEGRADED_WORKER_PROCESSING_TIME_MAX_SECONDS: ${DEGRADED_WORKER_PROCESSING_TIME_MAX_SECONDS:-6.0}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_METRICS_EXEMPLAR_FILTER: ${OTEL_METRICS_EXEMPLAR_FILTER:-trace_based}
      OTEL_SERVICE_NAME: demoboard-worker
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-docker-compose}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      APP_LOG_FILE: /var/log/demoboard/worker-service.log
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability-logs/worker:/var/log/demoboard

  frontend-service:
    build:
      context: ./frontend-service
      args:
        VITE_API_URL: /api
        VITE_ENABLE_WORKER: "true"
    depends_on:
      - api-service
    ports:
      - "8080:80"
    volumes:
      - ./observability-logs/frontend:/var/log/nginx

volumes:
  pgdata:
