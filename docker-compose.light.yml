version: "3.9"

services:
  api-service:
    build: ./api-service
    environment:
      DB_BACKEND: sqlite
      SQLITE_PATH: /data/tasks.db
      ENABLE_WORKER: "false"
      NODE_NAME: ${NODE_NAME:-}
      DEGRADED_NODE_MATCH: ${DEGRADED_NODE_MATCH:-eu-west-3c}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_METRICS_EXEMPLAR_FILTER: ${OTEL_METRICS_EXEMPLAR_FILTER:-trace_based}
      OTEL_SERVICE_NAME: demoboard-api
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-docker-compose-light}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      APP_LOG_FILE: /var/log/demoboard/api-service.log
    volumes:
      - api-data:/data
      - ./observability-logs/api:/var/log/demoboard
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  frontend-service:
    build:
      context: ./frontend-service
      args:
        VITE_API_URL: /api
        VITE_ENABLE_WORKER: "false"
    depends_on:
      - api-service
    ports:
      - "8080:80"
    volumes:
      - ./observability-logs/frontend:/var/log/nginx

volumes:
  api-data:
